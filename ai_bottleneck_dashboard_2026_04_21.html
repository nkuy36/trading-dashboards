            value={selectedTheme}
            onChange={(e) => setSelectedTheme(e.target.value)}
            className="bg-neutral-900 border border-neutral-700 text-white px-3 py-1.5 text-xs rounded focus:outline-none focus:border-amber-500"
          >
            <option value="all">All Themes</option>
            {themes.map(t => (
              <option key={t.id} value={t.id}>{t.code} · {t.name}</option>
            ))}
          </select>
          <div className="flex gap-1">
            {['all', 'EARLY', 'ON-TIME', 'LATE', 'STORY'].map(c => (
              <button
                key={c}
                onClick={() => setSelectedClass(c)}
                className={`px-3 py-1.5 text-xs rounded border transition-all ${
                  selectedClass === c
                    ? 'bg-white text-black border-white font-bold'
                    : 'bg-neutral-900 text-neutral-400 border-neutral-700 hover:border-neutral-500'
                }`}
              >
                {c === 'all' ? 'ALL CLASS' : c}
              </button>
            ))}
          </div>
          <input
            type="text"
            placeholder="Search ticker or note..."
            value={searchTerm}
            onChange={(e) => setSearchTerm(e.target.value)}
            className="bg-neutral-900 border border-neutral-700 text-white px-3 py-1.5 text-xs rounded focus:outline-none focus:border-amber-500 flex-1 min-w-[200px] max-w-xs placeholder:text-neutral-600"
          />
          <div className="text-xs text-neutral-500 ml-auto">
            Showing <span className="text-white font-bold">{filteredStocks.length}</span> of {stats.total}
          </div>
        </div>
      </div>

      {/* Main Content */}
      <div className="px-6 py-6 space-y-6">

        {/* Themes Grid */}
        <section>
          <div className="flex items-baseline justify-between mb-4">
            <h2 className="text-sm font-bold text-white tracking-widest uppercase">Bottleneck Themes</h2>
            <div className="text-xs text-neutral-500">Classification · Cycle Peak · Stock Count</div>
          </div>
          <div className="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-3">
            {filteredThemes.map(theme => {
              const color = themeColorMap[theme.color];
              const stockCount = theme.stocks.length;
              const earlyCount = theme.stocks.filter(s => s.classification === 'EARLY').length;
              const clsBadge = classColors[theme.classification];
              return (
                <div
                  key={theme.id}
                  className={`border ${color.border} ${color.bg} rounded-sm p-4 hover:bg-neutral-900 transition-colors cursor-pointer`}
                  onClick={() => setSelectedTheme(theme.id === selectedTheme ? 'all' : theme.id)}
                >
                  <div className="flex items-start justify-between gap-3 mb-3">
                    <div className="flex items-center gap-2 min-w-0">
                      <div className={`${color.accent} text-black text-[10px] font-bold px-1.5 py-0.5 rounded-sm`}>
                        {theme.code}
                      </div>
                      <h3 className={`font-bold text-sm ${color.text} truncate`}>{theme.name}</h3>
                    </div>
                    <div className={`text-[10px] px-2 py-0.5 rounded-sm border ${clsBadge?.border} ${clsBadge?.text} ${clsBadge?.bg} flex-shrink-0 font-bold`}>
                      {theme.classification}
                    </div>
                  </div>
                  <div className="space-y-2 text-[11px]">
                    <div>
                      <div className="text-neutral-500 uppercase tracking-wider text-[9px] mb-0.5">Bottleneck</div>
                      <div className="text-neutral-300 leading-relaxed">{theme.bottleneck}</div>
                    </div>
                    <div>
                      <div className="text-neutral-500 uppercase tracking-wider text-[9px] mb-0.5">Supply Response</div>
                      <div className="text-neutral-400 leading-relaxed">{theme.supply}</div>
                    </div>
                    <div className="flex items-center justify-between pt-2 border-t border-neutral-800">
                      <div>
                        <span className="text-neutral-500 text-[9px] uppercase tracking-wider">Peak: </span>
                        <span className="text-white font-bold text-[10px]">{theme.cyclePeak}</span>
                      </div>
                      <div className="text-[10px]">
                        <span className="text-white font-bold">{stockCount}</span>
                        <span className="text-neutral-500"> names · </span>
                        <span className="text-emerald-400 font-bold">{earlyCount}</span>
                        <span className="text-neutral-500"> early</span>
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </section>

        {/* Stocks Table */}
        <section>
          <div className="flex items-baseline justify-between mb-4">
            <h2 className="text-sm font-bold text-white tracking-widest uppercase">Stock Universe</h2>
            <div className="text-xs text-neutral-500">Ticker · Theme · Category · Classification</div>
          </div>
          <div className="border border-neutral-800 rounded-sm overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full text-xs">
                <thead className="bg-neutral-900 border-b border-neutral-800">
                  <tr>
                    <th className="text-left px-3 py-2.5 font-bold text-neutral-400 uppercase tracking-wider text-[10px]">Ticker</th>
                    <th className="text-left px-3 py-2.5 font-bold text-neutral-400 uppercase tracking-wider text-[10px]">Theme</th>
                    <th className="text-left px-3 py-2.5 font-bold text-neutral-400 uppercase tracking-wider text-[10px]">Category</th>
                    <th className="text-left px-3 py-2.5 font-bold text-neutral-400 uppercase tracking-wider text-[10px]">Thesis</th>
                    <th className="text-left px-3 py-2.5 font-bold text-neutral-400 uppercase tracking-wider text-[10px]">Class</th>
                  </tr>
                </thead>
                <tbody>
                  {filteredStocks.map((stock, i) => {
                    const cls = classColors[stock.classification];
                    return (
                      <tr
                        key={`${stock.ticker}-${stock.themeId}-${i}`}
                        className="border-b border-neutral-900 hover:bg-neutral-900/50 transition-colors"
                      >
                        <td className="px-3 py-2 font-bold text-white">{stock.ticker}</td>
                        <td className="px-3 py-2 text-neutral-500">
                          <span className="text-neutral-600 mr-1">{stock.themeCode}</span>
                          {stock.themeName}
                        </td>
                        <td className="px-3 py-2 text-neutral-400">{stock.category}</td>
                        <td className="px-3 py-2 text-neutral-300">{stock.note}</td>
                        <td className="px-3 py-2">
                          <span className={`inline-block px-2 py-0.5 rounded-sm text-[10px] font-bold border ${cls?.border} ${cls?.text} ${cls?.bg}`}>
                            {stock.classification}
                          </span>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </section>

        {/* Bottom grid: Catalysts + Exit Signals */}
        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
          <section>
            <div className="flex items-baseline justify-between mb-4">
              <h2 className="text-sm font-bold text-white tracking-widest uppercase">90-Day Catalyst Calendar</h2>
            </div>
            <div className="border border-neutral-800 rounded-sm overflow-hidden">
              {catalysts.map((c, i) => (
                <div
                  key={i}
                  className="flex items-start gap-3 px-3 py-2.5 border-b border-neutral-900 last:border-b-0 hover:bg-neutral-900/50 transition-colors"
                >
                  <div className="w-20 flex-shrink-0 text-amber-400 font-bold text-xs">{c.date}</div>
                  <div className="flex-1 text-xs text-neutral-200">{c.event}</div>
                  <div className="flex flex-wrap gap-1 flex-shrink-0">
                    {c.tickers.map(t => (
                      <span key={t} className="text-[9px] bg-neutral-800 text-white font-bold px-1.5 py-0.5 rounded-sm">{t}</span>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </section>

          <section>
            <div className="flex items-baseline justify-between mb-4">
              <h2 className="text-sm font-bold text-white tracking-widest uppercase">Exit Signals</h2>
            </div>
            <div className="border border-neutral-800 rounded-sm overflow-hidden">
              {exitSignals.map((s, i) => (
                <div
                  key={i}
                  className="px-3 py-2.5 border-b border-neutral-900 last:border-b-0 hover:bg-neutral-900/50 transition-colors"
                >
                  <div className="text-xs text-neutral-200 mb-1">▸ {s.signal}</div>
                  <div className="text-[11px] text-amber-400 font-bold ml-3">→ {s.action}</div>
                </div>
              ))}
            </div>
          </section>
        </div>

        {/* Legend */}
        <section className="border-t border-neutral-800 pt-4">
          <div className="flex items-baseline gap-6 flex-wrap text-xs">
            <div className="text-neutral-500 uppercase tracking-widest text-[10px]">Classification Key:</div>
            <div className="flex items-center gap-2">
              <div className="w-3 h-3 bg-emerald-500 rounded-sm"></div>
              <span className="text-neutral-300"><span className="text-emerald-400 font-bold">EARLY</span> - Under-discovered, highest asymmetry</span>
            </div>
            <div className="flex items-center gap-2">
              <div className="w-3 h-3 bg-amber-500 rounded-sm"></div>
              <span className="text-neutral-300"><span className="text-amber-400 font-bold">ON-TIME</span> - Valid setups, known narrative</span>
            </div>
            <div className="flex items-center gap-2">
              <div className="w-3 h-3 bg-red-500 rounded-sm"></div>
              <span className="text-neutral-300"><span className="text-red-400 font-bold">LATE</span> - Extended, wait for flush</span>
            </div>
            <div className="flex items-center gap-2">
              <div className="w-3 h-3 bg-violet-500 rounded-sm"></div>
              <span className="text-neutral-300"><span className="text-violet-400 font-bold">STORY</span> - Binary/high-risk, not EP setup</span>
            </div>
          </div>
        </section>

        {/* Footer */}
        <footer className="border-t border-neutral-800 pt-4 text-[10px] text-neutral-600 flex items-center justify-between flex-wrap gap-2">
          <div>
            RESEARCH DASHBOARD · NOT INVESTMENT ADVICE · EP FRAMEWORK APPLIED · ERR ON INCLUSION · PURE AI BOTTLENECK SCOPE
          </div>
          <div className="font-bold text-neutral-500">
            v1.0 · Apr 2026
          </div>
        </footer>

      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<AIBottleneckDashboard />);
</script>
</body>
</html>
